
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fara</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .label { font-weight: bold; color: #7f8c8d; font-size: 0.9em; }
        .img-box { text-align: center; margin-top: 20px; }
        img { max-width: 100%; height: auto; border-radius: 8px; border: 1px solid #ddd; }
        .btn-back { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #3498db; font-weight: bold; }
    </style>
</head>
<body>
    <a href="../index.html" class="btn-back">← Powrót do mapy</a>
    <div class="card">
        <h1>Fara</h1>
        <div class="info-grid">
            <div><span class="label">MIEJSCOWOŚĆ</span><br>Grudziądz</div>
            <div><span class="label">DATOWANIE</span><br>2. poł. XV w.</div>
            <div><span class="label">MAJSTER</span><br>Nieznany</div>
            <div><span class="label">TYP SKLEPIENIA</span><br>Gwiaździste ośmioramienne z żebrami wpisanymi</div>
        </div>
        <div class="description">
            <span class="label">OPIS</span>
            <p>Nawa główna</p>
        </div>
        <div class="img-box">
            <img src="../images/Grudziadz.jpg" alt="Rzut">
        </div>
    </div>
</body>
</html>
