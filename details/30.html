
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fara, Puck - Mapping Late Gothic Vaults</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Open Sans', sans-serif; line-height: 1.6; max-width: 1000px; margin: 0 auto; padding: 20px; background: #f8f9fa; color: #333; }
        .card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-family: 'Merriweather', serif; color: #1a252f; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-top: 0; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 30px 0; background: #f8fafc; padding: 25px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .label { font-weight: 600; color: #64748b; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.5px; }
        .val { font-size: 1.15em; color: #0f172a; margin-top: 5px; font-weight: 600; }
        
        /* ZAKTUALIZOWANE STYLE DLA GALERII DWÓCH ZDJĘĆ */
        .image-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
        .gallery-item { display: flex; flex-direction: column; align-items: center; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .gallery-label { font-family: 'Merriweather', serif; color: #1e293b; font-size: 1.1em; margin-bottom: 15px; border-bottom: 2px solid #38bdf8; padding-bottom: 5px; text-align: center; width: 100%; }
        .gallery-item img { max-width: 100%; height: auto; max-height: 500px; object-fit: contain; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .btn-back { display: inline-flex; align-items: center; margin-bottom: 25px; text-decoration: none; color: #3b82f6; font-weight: 600; transition: color 0.2s; }
        .btn-back:hover { color: #2563eb; }
    </style>
</head>
<body>
    <a href="../index.html" class="btn-back">← Wróć do mapy</a>
    <div class="card">
        <h1>Fara, Puck</h1>
        <div class="info-grid">
            <div><div class="label">Typ Sklepienia</div><div class="val">Sklepienie z żebrami krzywokreślnymi</div></div>
            <div><div class="label">Umiejscowienie</div><div class="val">Kaplice</div></div>
            <div><div class="label">Datowanie</div><div class="val">przed 1597</div></div>
            <div><div class="label">Majster</div><div class="val">Nieznany</div></div>
        </div>
        
        <div class="image-gallery">
                <div class="gallery-item">
                    <div class="gallery-label">Rzut / Plan</div>
                    <img src="../images/Puck.jpg" alt="Rzut poziomy">
                </div>
            </div>
        
    </div>
</body>
</html>
