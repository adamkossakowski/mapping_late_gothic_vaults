"Chronologia":"1481\u20131514","Metoda":null,"Szerokosc":null,"Dlugosc":null,"Literatura":null,"Ilustracja":null,"Majster":null},{"ID":16,"Nazwa":"Ko\u015bci\u00f3\u0142 Mariacki?","Miasto":"Elbl\u0105g","Region":"Prusy Kr\u00f3l.","Panstwo":"Polska","Kategoria":"Sakralna","Typ_Sklepienia":"Sklepienia gwia\u017adzisto-sieciowe","Opis":null,"Chronologia":"po 1504","Metoda":null,"Szerokosc":null,"Dlugosc":null,"Literatura":null,"Ilustracja":null,"Majster":null},{"ID":17,"Nazwa":"Zamek","Miasto":"Olsztyn","Region":"Prusy Kr\u00f3l.","Panstwo":"Polska","Kategoria":"\u015awiecka","Typ_Sklepienia":"Sklepienia gwia\u017adzisto-sieciowe","Opis":null,"Chronologia":"2. \u0107w. XVI w.","Metoda":null,"Szerokosc":null,"Dlugosc":null,"Literatura":null,"Ilustracja":null,"Majster":null},{"ID":18,"Nazwa":"Fara","Miasto":"Olsztyn","Region":"Prusy Kr\u00f3l.","Panstwo":"Polska","Kategoria":"Sakralna","Typ_Sklepienia":"Sklepienia gwia\u017adzisto-sieciowe","Opis":null,"Chronologia":"2. \u0107w. XVI w.","Metoda":null,"Szerokosc":null,"Dlugosc":null,"Literatura":null,"Ilustracja":null,"Majster":null}];
        const map = L.map('map').setView([53.8, 19.0], 6);

        // POPRAWIONA LINIA (podwójne klamry przy r)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        const markers = L.markerClusterGroup({
            spiderfyOnMaxZoom: true,
            showCoverageOnHover: false
        });

        sites.forEach(s => {
            if(s.Szerokosc && s.Dlugosc) {
                const color = s.Kategoria === "Sakralna" ? "#3498db" : "#e74c3c";
                const marker = L.circleMarker([s.Szerokosc, s.Dlugosc], {
                    radius: 10,
                    fillColor: color,
                    color: "#fff",
                    weight: 2,
                    fillOpacity: 0.8
                });
                
                let illustrationHtml = '';
                if (s.Ilustracja) {
                    illustrationHtml = `<img src="images/${s.Ilustracja}" class="vault-illustration" alt="Rzut">`;
                }
                
                marker.bindPopup(`
                    <div style="font-family: sans-serif; min-width: 250px;">
                        <b style="font-size:14px">${s.Nazwa || "Obiekt"}</b> (${s.Miasto || ""})<br>
                        <hr>
                        <b>Typ:</b> ${s.Typ_Sklepienia || "---"}<br>
                        <b>Chronologia:</b> ${s.Chronologia || "---"}<br>
                        <i>${s.Opis || ""}</i>
                        ${illustrationHtml}
                    </div>
                `);
                markers.addLayer(marker);
            }
        });

        map.addLayer(markers);
    </script>
</body>
</html>
