        const markers = L.markerClusterGroup({
            spiderfyOnMaxZoom: true,
            showCoverageOnHover: false
        });

        sites.forEach(s => {
            if(s.Szerokosc && s.Dlugosc) {
                const color = s.Kategoria === "Sakralna" ? "#3498db" : "#e74c3c";
                const marker = L.circleMarker([s.Szerokosc, s.Dlugosc], {
                    radius: 10,
                    fillColor: color,
                    color: "#fff",
                    weight: 2,
                    fillOpacity: 0.8
                });
                
                let imgHtml = s.Ilustracja ? `<img src="images/${s.Ilustracja}" class="vault-illustration" alt="Rzut">` : "";
                
                marker.bindPopup(`
                    <div style="font-family: sans-serif; min-width: 250px;">
                        <b style="font-size:14px">${s.Nazwa || "Obiekt"}</b> (${s.Miasto || ""})<br>
                        <hr>
                        <b>Majster:</b> ${s.Majster || "Nieznany"}<br>
                        <b>Typ:</b> ${s.Typ_Sklepienia || "---"}<br>

                        <i>${s.Opis || ""}</i>
                        ${imgHtml}
                    </div>
                `);
                markers.addLayer(marker);
            }
        });

        map.addLayer(markers);
